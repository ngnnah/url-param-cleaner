<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="space" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop stop-color="#312e81"/><stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="hornA" x1="90" y1="12" x2="106" y2="38" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fde68a"/><stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <rect x="4" y="4" width="120" height="120" rx="28" fill="url(#space)"/>
  <g fill="#fef9c3">
    <circle cx="24" cy="24" r="1.6"/><circle cx="42" cy="16" r="1"/>
    <circle cx="18" cy="52" r="1.2"/><circle cx="28" cy="102" r="1.4"/>
    <circle cx="16" cy="80" r="1"/><circle cx="50" cy="110" r="1.2"/>
  </g>

  <!-- horizontal rainbow trail (behind unicorn), extended -->
  <g>
    <rect x="6" y="52"   width="58" height="6.5" fill="#ff3b3b"/>
    <rect x="6" y="58.5" width="58" height="6.5" fill="#ff9f1c"/>
    <rect x="6" y="65"   width="58" height="6.5" fill="#ffe600"/>
    <rect x="6" y="71.5" width="58" height="6.5" fill="#2ecc40"/>
    <rect x="6" y="78"   width="58" height="6.5" fill="#3ba7ff"/>
    <rect x="6" y="84.5" width="58" height="6.5" fill="#8a5cff"/>
  </g>

  <!-- unicorn (large, facing right) — shifted left off the edge -->
  <g transform="translate(-5,0)">
    <!-- flowing rainbow tail, lifted above the trail so it reads -->
    <g stroke-linecap="round" fill="none">
      <path d="M58 60 C48 52 44 60 46 70" stroke="#ff3b3b" stroke-width="5"/>
      <path d="M61 60 C52 53 49 61 51 71" stroke="#ffe600" stroke-width="5"/>
      <path d="M64 61 C56 55 54 62 56 72" stroke="#3ba7ff" stroke-width="5"/>
    </g>
    <!-- body -->
    <rect x="56" y="54" width="46" height="34" rx="16" fill="#ffffff"/>
    <!-- legs (running) -->
    <rect x="62" y="82" width="8" height="20" rx="4" fill="#ffffff"/>
    <rect x="74" y="84" width="8" height="17" rx="4" fill="#dbe0e8"/>
    <rect x="88" y="82" width="8" height="20" rx="4" fill="#ffffff"/>
    <rect x="98" y="84" width="8" height="17" rx="4" fill="#dbe0e8"/>
    <!-- head + muzzle (muzzle shortened) -->
    <ellipse cx="99" cy="48" rx="15" ry="13" fill="#ffffff"/>
    <path d="M109 51 q9 0 9 6 q0 5 -8 5 q-7 0 -7 -6 Z" fill="#ffffff"/>
    <circle cx="115" cy="56" r="1.4" fill="#c7b8d6"/>
    <!-- ear -->
    <path d="M92 36 L96 28 L100 37 Z" fill="#ffffff"/>
    <!-- rainbow mane down the neck -->
    <g>
      <path d="M86 40 q6 -4 12 -2 l-2 6 q-6 -2 -11 1 Z" fill="#ff3b3b"/>
      <path d="M84 48 q6 -4 12 -2 l-2 6 q-6 -2 -11 1 Z" fill="#ffe600"/>
      <path d="M82 56 q6 -4 12 -2 l-2 6 q-6 -2 -11 1 Z" fill="#2ecc40"/>
      <path d="M80 64 q6 -4 12 -2 l-2 6 q-6 -2 -11 1 Z" fill="#3ba7ff"/>
    </g>
    <!-- horn -->
    <path d="M99 34 L104 12 L108 35 Z" fill="url(#hornA)"/>
    <!-- eye + cheek -->
    <circle cx="104" cy="46" r="2.6" fill="#1f2937"/>
    <circle cx="110" cy="53" r="2.4" fill="#fbcfe8"/>
  </g>

  <g fill="#fde68a">
    <path d="M40 40 l1.6 4 4 1.6 -4 1.6 -1.6 4 -1.6 -4 -4 -1.6 4 -1.6 Z"/>
    <path d="M64 104 l1.3 3 3 1.3 -3 1.3 -1.3 3 -1.3 -3 -3 -1.3 3 -1.3 Z"/>
  </g>
</svg>
