<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="handle" x1="20" y1="106" x2="106" y2="38" gradientUnits="userSpaceOnUse">
      <stop stop-color="#b45309"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="mane" x1="34" y1="44" x2="72" y2="96" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f472b6"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <!-- badge -->
  <rect x="4" y="4" width="120" height="120" rx="28" fill="url(#bg)"/>

  <!-- broom -->
  <g stroke-linecap="round">
    <!-- bristles -->
    <path d="M30 96 L14 108 L18 92 L10 98 L16 84 Z" fill="#fcd34d"/>
    <path d="M26 92 L12 104" stroke="#b45309" stroke-width="2"/>
    <path d="M28 96 L16 106" stroke="#b45309" stroke-width="2"/>
    <!-- handle -->
    <line x1="26" y1="98" x2="108" y2="34" stroke="url(#handle)" stroke-width="7"/>
  </g>

  <!-- sparkle trail -->
  <g fill="#fde68a">
    <path d="M100 40 l2 5 5 2 -5 2 -2 5 -2 -5 -5 -2 5 -2 Z"/>
    <path d="M112 30 l1.5 3.5 3.5 1.5 -3.5 1.5 -1.5 3.5 -1.5 -3.5 -3.5 -1.5 3.5 -1.5 Z"/>
    <circle cx="94" cy="30" r="2"/>
  </g>

  <!-- unicorn -->
  <g>
    <!-- tail -->
    <path d="M40 74 C28 70 26 84 32 92 C34 82 40 82 44 82 Z" fill="url(#mane)"/>
    <!-- body -->
    <ellipse cx="60" cy="74" rx="22" ry="15" fill="#ffffff"/>
    <!-- legs -->
    <rect x="50" y="84" width="6" height="14" rx="3" fill="#ffffff"/>
    <rect x="64" y="84" width="6" height="14" rx="3" fill="#ffffff"/>
    <!-- neck + head -->
    <path d="M70 66 C74 52 82 48 88 48 C94 48 96 56 92 64 C88 72 78 74 70 72 Z" fill="#ffffff"/>
    <!-- ear -->
    <path d="M86 46 L90 38 L93 47 Z" fill="#ffffff"/>
    <!-- mane -->
    <path d="M74 52 C70 48 72 42 78 40 C76 46 80 48 82 50 C80 54 76 56 74 60 Z" fill="url(#mane)"/>
    <!-- horn -->
    <path d="M90 44 L96 26 L98 45 Z" fill="#fbbf24"/>
    <!-- eye -->
    <circle cx="86" cy="56" r="2.4" fill="#1f2937"/>
    <!-- wizard hat -->
    <path d="M74 42 L96 8 L112 40 Z" fill="#312e81"/>
    <ellipse cx="93" cy="41" rx="22" ry="6" fill="#4338ca"/>
    <g fill="#fde68a">
      <path d="M94 24 l1.5 3.5 3.5 1.5 -3.5 1.5 -1.5 3.5 -1.5 -3.5 -3.5 -1.5 3.5 -1.5 Z"/>
      <circle cx="88" cy="34" r="1.8"/>
      <circle cx="100" cy="33" r="1.5"/>
    </g>
  </g>
</svg>
